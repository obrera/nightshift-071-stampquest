services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - STAMPQUEST_PUBLIC_BASE_URL
      - STAMPQUEST_DEVNET_RPC_URL
      - STAMPQUEST_DEVNET_WS_URL
      - STAMPQUEST_DEVNET_SIGNER_KEYPAIR
      - STAMPQUEST_EXECUTE_PLUGIN_COLLECTION_ADDRESS
      - STAMPQUEST_OPERATOR_WALLETS
      - PORT
    restart: unless-stopped
    volumes:
      - stampquest-data:/app/data

volumes:
  stampquest-data:
